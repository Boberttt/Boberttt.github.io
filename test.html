<script>
  // get the body element
var body = document.body;

// set the initial background color (if desired)
body.style.backgroundColor = 'white';

// set the target background color
var targetColor = 'black';

// function to update the background color
function updateBodyBgColor(percentage) {
  // calculate the new red, green, and blue values
  var newColor = 'rgb(' +
    Math.round(255 - (percentage * (255 - 0))) + ',' +
    Math.round(255 - (percentage * (255 - 0))) + ',' +
    Math.round(255 - (percentage * (255 - 0))) + ')';
  // update the body's background color
  body.style.backgroundColor = newColor;
}

// function to perform the fade
function fadeToColor(duration) {
  // get the current time
  var start = new Date().getTime();
  // loop until the duration has passed
  var intervalId = setInterval(function() {
    // get the time passed
    var timePassed = new Date().getTime() - start;
    // calculate the percentage of time passed
    var percentage = timePassed / duration;
    // if the duration has passed, stop the loop
    if (percentage >= 1) {
      clearInterval(intervalId);
      return;
    }
    // update the body's background color
    updateBodyBgColor(percentage);
  }, 10);
}

// fade the body's background color to black over a duration of 5000ms (5 seconds)
fadeToColor(5000);

</script>
