<script>
  // First, let's get a reference to the body element
var body = document.querySelector('body');

// Next, let's create a function that fades the background to black
function fadeToBlack() {
  // Set the initial background color to white
  body.style.backgroundColor = 'white';

  // Get the current time in milliseconds
  var start = Date.now();

  // Start an interval that runs every 10 milliseconds
  var timer = setInterval(function() {
    // Calculate the elapsed time in seconds
    var elapsed = (Date.now() - start) / 1000;

    // Calculate the new background color using the elapsed time
    var newBackgroundColor = 'rgb(0, 0, ' + (elapsed * 255) + ')';

    // Update the background color
    body.style.backgroundColor = newBackgroundColor;

    // If the elapsed time is greater than 1 second, stop the interval
    if (elapsed > 1) {
      clearInterval(timer);
    }
  }, 10);
}

// Finally, let's call the fadeToBlack function when the page loads
window.onload = fadeToBlack;
</script>
